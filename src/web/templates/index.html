<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLens - Pencarian Destinasi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preload" href="{{ url_for('static', filename='images/bandung.jpg') }}" as="image">
    <link rel="preload" href="{{ url_for('static', filename='images/jakarta.jpg') }}" as="image">
    <link rel="preload" href="{{ url_for('static', filename='images/semarang.jpg') }}" as="image">
    <link rel="preload" href="{{ url_for('static', filename='images/surabaya.jpg') }}" as="image">
    <link rel="preload" href="{{ url_for('static', filename='images/yogyakarta.jpg') }}" as="image">
</head>
<body>

    <div class="hero">
        <div class="hero-slideshow">
            <div class="hero-slide active" style="background-image: url('{{ url_for('static', filename='images/bandung.jpg') }}');"></div>
            <div class="hero-slide" style="background-image: url('{{ url_for('static', filename='images/jakarta.jpg') }}');"></div>
            <div class="hero-slide" style="background-image: url('{{ url_for('static', filename='images/semarang.jpg') }}');"></div>
            <div class="hero-slide" style="background-image: url('{{ url_for('static', filename='images/surabaya.jpg') }}');"></div>
            <div class="hero-slide" style="background-image: url('{{ url_for('static', filename='images/yogyakarta.jpg') }}');"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Temukan Destinasi Wisata Impian Anda</h1>
            <p>Didukung oleh FAISS Vector Search & Sentence Transformers</p>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">

            <div class="tabs">
                <button type="button" class="tab-btn active" data-target="q1" onclick="switchTab('q1')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Q1 &middot; Semantik
                </button>
                <button type="button" class="tab-btn" data-target="q2" onclick="switchTab('q2')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                    Q2 &middot; Kategori
                </button>
                <button type="button" class="tab-btn" data-target="q3" onclick="switchTab('q3')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Q3 &middot; Kota
                </button>
                <button type="button" class="tab-btn" data-target="q4" onclick="switchTab('q4')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                    Q4 &middot; Luas
                </button>
                <button type="button" class="tab-btn" data-target="q5" onclick="switchTab('q5')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    Q5 &middot; Mirip Destinasi
                </button>
                <button type="button" class="tab-btn" data-target="q6" onclick="switchTab('q6')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16m-7 6h7"/></svg>
                    Q6 &middot; Multi-Query
                </button>
                <button type="button" class="tab-btn" data-target="q7" onclick="switchTab('q7')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                    Q7 &middot; PCA
                </button>
            </div>

            <!-- Q1 Form -->
            <form id="q1" class="form-section active" action="/search/q1" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q1_query">Deskripsi Destinasi</label>
                    <textarea id="q1_query" name="query" placeholder="Contoh: pantai tenang untuk keluarga dengan snorkeling..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q2 Form -->
            <form id="q2" class="form-section" action="/search/q2" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q2_query">Kata Kunci</label>
                    <textarea id="q2_query" name="query" placeholder="Contoh: pemandangan alam yang indah" required></textarea>
                </div>
                <div class="form-group">
                    <label for="q2_category">Kategori Wisata</label>
                    <select id="q2_category" name="category" required>
                        <option value="" disabled selected>Pilih kategori...</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q3 Form -->
            <form id="q3" class="form-section" action="/search/q3" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q3_query">Kata Kunci</label>
                    <textarea id="q3_query" name="query" placeholder="Contoh: tempat bersejarah peninggalan belanda" required></textarea>
                </div>
                <div class="form-group">
                    <label>Pilih Kota</label>
                    <div class="chip-group">
                        {% for city in cities %}
                        <label class="chip-label">
                            <input type="checkbox" name="cities" value="{{ city }}">
                            <span>{{ city }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q4 Form -->
            <form id="q4" class="form-section" action="/search/q4" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q4_query">Pencarian Luas</label>
                    <textarea id="q4_query" name="query" placeholder="Contoh: wisata populer" required></textarea>
                </div>
                <div class="form-group">
                    <label>Jumlah Hasil (k)</label>
                    <div class="range-container">
                        <input type="range" name="k" min="5" max="50" value="20" oninput="document.getElementById('q4_val').textContent = this.value">
                        <span id="q4_val" class="range-val">20</span>
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q5 Form -->
            <form id="q5" class="form-section" action="/search/q5" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q5_dest">Nama Destinasi Acuan</label>
                    <input type="text" id="q5_dest" name="destination_id" placeholder="Contoh: Candi Borobudur" required>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q6 Form -->
            <form id="q6" class="form-section" action="/search/q6" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q6_q1">Query 1</label>
                    <textarea id="q6_q1" name="query1" placeholder="Contoh: wisata pegunungan" required style="min-height: 50px; margin-bottom: 8px;"></textarea>

                    <label for="q6_q2">Query 2</label>
                    <textarea id="q6_q2" name="query2" placeholder="Contoh: hiking" required style="min-height: 50px; margin-bottom: 8px;"></textarea>

                    <label for="q6_q3">Query 3</label>
                    <textarea id="q6_q3" name="query3" placeholder="Contoh: sunrise" required style="min-height: 50px;"></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

            <!-- Q7 Form -->
            <form id="q7" class="form-section" action="/search/q7" method="POST" onsubmit="showLoading(this)">
                <div class="form-group">
                    <label for="q7_query">Pencarian Tereduksi</label>
                    <textarea id="q7_query" name="query" placeholder="Contoh: wisata edukasi" required></textarea>
                </div>
                <div style="margin-bottom: 20px;">
                    <span class="m-tag" style="background: #f1f5f9; padding: 6px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: 600;">PCA: 64 dimensi</span>
                </div>
                <button type="submit" class="btn-submit">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -3px; margin-right: 4px;"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Cari Destinasi
                    </span>
                </button>
            </form>

        </div>

        <div class="stats-chips">
            <span class="stat-chip">Model: MiniLM-L12-v2</span>
            <span class="stat-chip">Index: FAISS FlatIP</span>
            <span class="stat-chip">384 Dimensi Vektor</span>
            <a href="/performance" class="stat-chip" style="text-decoration: none; color: var(--primary-dark); font-weight: 700; background: #e0f2fe; border-color: #bae6fd;">Lihat Analisis Performa &rarr;</a>
        </div>
    </div>

    <script>
        function switchTab(targetId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));

            document.querySelector(`[data-target="${targetId}"]`).classList.add('active');
            document.getElementById(targetId).classList.add('active');
        }

        function showLoading(form) {
            const btn = form.querySelector('.btn-submit');
            btn.classList.add('loading');

            // Text to show
            const btnText = btn.querySelector('.btn-text');
            if (btnText) {
                // Keep icon, but hide text and let spinner show
                // Handled via CSS .loading .btn-text { display: none }
            }
        }

        // Hero Slideshow
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.hero-slide');
            let currentSlide = 0;
            const slideCount = slides.length;

            if (slideCount > 0) {
                setInterval(() => {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slideCount;
                    slides[currentSlide].classList.add('active');
                }, 5000);
            }
        });
    </script>
</body>
</html>
